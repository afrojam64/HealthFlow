server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never  # No mostrar stacktrace en producción

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update  # En producción, idealmente 'validate' o 'none', pero 'update' es más cómodo
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: America/Bogota
        format_sql: false
        show_sql: false
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true

  mail:
    host: ${SPRING_MAIL_HOST}
    port: ${SPRING_MAIL_PORT}
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
    default-encoding: UTF-8

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

healthflow:
  timezone: America/Bogota
  publicBaseUrl: ${PUBLIC_URL:https://healthflow-app.onrender.com}
  appointment:
    slotMinutes: 30
    minLeadMinutes: 120
  seed:
    enabled: false  # Desactivar la siembra de datos en producción (solo para pruebas iniciales)
  upload-dir: uploads
  document:
    expiration-days: 7