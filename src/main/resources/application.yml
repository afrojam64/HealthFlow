server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/healthflow
    username: postgres
    password: TmX85col1978
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: America/Bogota
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
    default-encoding: UTF-8

healthflow:
  timezone: America/Bogota
  publicBaseUrl: http://localhost:8080
  appointment:
    slotMinutes: 30
    minLeadMinutes: 120
  seed:
    enabled: true
  upload-dir: uploads
  document:
    expiration-days: 7