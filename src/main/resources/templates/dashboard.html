<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <!-- Título y bienvenida -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h2"><i class="bi bi-speedometer2 text-primary-custom me-2"></i>Dashboard</h1>
        <div><span class="text-muted"><i class="bi bi-calendar3 me-1"></i><span th:text="${#dates.format(new java.util.Date(), 'EEEE, d MMMM yyyy')}"></span></span></div>
    </div>

    <!-- Cards de estadísticas -->
    <div class="row g-4 mb-4">
        <div class="col-xl-3 col-md-6">
            <div class="card card-health h-100">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <span class="text-muted text-uppercase small">Citas Hoy</span>
                            <h2 class="display-6 mt-2 mb-0 text-primary-custom" th:text="${stats.citasHoy}">0</h2>
                        </div>
                        <div class="bg-primary-custom bg-opacity-10 p-3 rounded"><i class="bi bi-calendar-day fs-1 text-primary-custom"></i></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-xl-3 col-md-6">
            <div class="card card-health h-100">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <span class="text-muted text-uppercase small">Citas Semana</span>
                            <h2 class="display-6 mt-2 mb-0 text-success" th:text="${stats.citasSemana}">0</h2>
                        </div>
                        <div class="bg-success bg-opacity-10 p-3 rounded"><i class="bi bi-calendar-week fs-1 text-success"></i></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-xl-3 col-md-6">
            <div class="card card-health h-100">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <span class="text-muted text-uppercase small">Pacientes Nuevos</span>
                            <h2 class="display-6 mt-2 mb-0 text-info" th:text="${stats.pacientesNuevos}">0</h2>
                        </div>
                        <div class="bg-info bg-opacity-10 p-3 rounded"><i class="bi bi-person-plus fs-1 text-info"></i></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-xl-3 col-md-6">
            <div class="card card-health h-100">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <span class="text-muted text-uppercase small">Ocupación</span>
                            <h2 class="display-6 mt-2 mb-0 text-warning" th:text="${stats.ocupacion} + '%'">0%</h2>
                        </div>
                        <div class="bg-warning bg-opacity-10 p-3 rounded"><i class="bi bi-pie-chart fs-1 text-warning"></i></div>
                    </div>
                    <div class="progress mt-3" style="height: 8px;"><div class="progress-bar bg-warning" th:style="'width: ' + ${stats.ocupacion} + '%'"></div></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Próximas Citas -->
    <div class="row">
        <div class="col-12">
            <div class="card card-health">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <h5 class="mb-0"><i class="bi bi-clock-history me-2 text-primary-custom"></i>Próximas Citas</h5>
                    <a href="#" class="btn btn-sm btn-primary-custom">Ver todas <i class="bi bi-arrow-right ms-1"></i></a>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                            <tr>
                                <th>Fecha/Hora</th>
                                <th>Paciente</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:if="${proximasCitas.isEmpty()}">
                                <td colspan="4" class="text-center py-4 text-muted">
                                    <i class="bi bi-calendar-x fs-4 d-block mb-2"></i>No hay citas próximas
                                </td>
                            </tr>
                            <tr th:each="cita : ${proximasCitas}">
                                <td>
                                    <strong th:text="${#temporals.isToday(cita.dateTime) ? 'Hoy' : (#temporals.isTomorrow(cita.dateTime) ? 'Mañana' : #strings.capitalize(#temporals.format(cita.dateTime, 'EEE, d MMM')))}"></strong>
                                    <span class="text-muted" th:text="'a las ' + ${#temporals.format(cita.dateTime, 'hh:mm a')}"></span>
                                </td>
                                <td>
                                    <div class="d-flex align-items-center">
                                        <i class="bi bi-person-circle me-2 fs-4"></i>
                                        <div>
                                            <strong th:text="${cita.patient.firstName + ' ' + cita.patient.lastName}"></strong><br>
                                            <small class="text-muted" th:text="${cita.patient.docType + ' ' + cita.patient.docNumber}"></small>
                                        </div>
                                    </div>
                                </td>
                                <td>
                                    <span class="badge" th:classappend="'badge-' + ${cita.status}" th:text="${#strings.capitalize(cita.status.toString().toLowerCase())}"></span>
                                </td>
                                <td>
                                    <a th:href="@{/doctor/citas/{id}(id=${cita.id})}" class="btn btn-sm btn-outline-primary-custom me-1"><i class="bi bi-eye"></i></a>
                                    <a href="#" class="btn btn-sm btn-outline-danger"><i class="bi bi-x-circle"></i></a>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
