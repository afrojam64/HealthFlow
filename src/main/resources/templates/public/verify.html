<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Verificación de Documento - HealthFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background: linear-gradient(135deg, #E8F5F2 0%, #F9FAFB 100%); min-height: 100vh; }
        .card { border-radius: 32px; border: none; box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1); }
        .btn-primary { background: #2A7F6E; border: none; }
        .btn-primary:hover { background: #1E5F51; }
    </style>
</head>
<body class="d-flex align-items-center">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card p-4 text-center">
                <div th:if="${valid}">
                    <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
                    <h2 class="mt-3">Documento Válido</h2>
                    <p class="text-muted">Este documento fue emitido por HealthFlow y no ha sido alterado.</p>
                    <hr>
                    <div class="text-start">
                        <p><strong>Paciente:</strong> <span th:text="${patientName}"></span></p>
                        <p><strong>Médico:</strong> <span th:text="${doctorName}"></span></p>
                        <p><strong>Especialidad:</strong> <span th:text="${specialty}"></span></p>
                        <p><strong>Fecha de emisión:</strong> <span th:text="${date}"></span></p>
                        <p><strong>Tipo de documento:</strong> <span th:text="${documentType}"></span></p>
                    </div>
                </div>
                <div th:unless="${valid}">
                    <i class="bi bi-x-circle-fill text-danger" style="font-size: 4rem;"></i>
                    <h2 class="mt-3">Documento No Válido</h2>
                    <p class="text-muted" th:text="${message}">No se pudo verificar la autenticidad de este documento.</p>
                </div>
                <div class="mt-4">
                    <p class="text-muted mt-3 small">© 2026 HealthFlow - Gestión Clínica Digital</p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
