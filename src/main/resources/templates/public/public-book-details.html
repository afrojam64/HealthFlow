<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Confirmar datos del paciente</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/public/book/{id}(id=${professional.id})}">HealthFlow</a>
    </div>
</nav>

<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-8">

            <div class="card shadow-sm mb-3">
                <div class="card-body">
                    <h4 class="card-title mb-1">Datos del paciente</h4>
                    <div class="text-muted">
                        Profesional: <strong th:text="${professional.fullName}">Profesional</strong>
                        <span th:if="${professional.specialty != null}">
              — <span th:text="${professional.specialty}">Especialidad</span>
            </span>
                    </div>
                    <div class="mt-2">
                        Fecha y hora seleccionada:
                        <span class="badge text-bg-success"
                              th:text="${#temporals.format(dateTime, 'yyyy-MM-dd HH:mm')}">2026-02-23 10:30</span>
                        <div class="small text-muted mt-1" th:text="${dateTime}">OffsetDateTime</div>
                    </div>
                </div>
            </div>

            <!-- FORM: en el siguiente paso lo conectamos al POST real (/api/public/.../book) -->
            <div class="card shadow-sm">
                <div class="card-body">
                    <form id="patientForm">

                        <div class="row g-2">
                            <div class="col-12 col-md-4">
                                <label class="form-label">Tipo doc</label>
                                <select class="form-select" name="docType" required>
                                    <option value="CC">CC</option>
                                    <option value="TI">TI</option>
                                    <option value="CE">CE</option>
                                    <option value="PA">PA</option>
                                </select>
                            </div>
                            <div class="col-12 col-md-8">
                                <label class="form-label">Número doc</label>
                                <input class="form-control" name="docNumber" required />
                            </div>

                            <div class="col-12 col-md-6">
                                <label class="form-label">Primer nombre</label>
                                <input class="form-control" name="firstName" required />
                            </div>
                            <div class="col-12 col-md-6">
                                <label class="form-label">Segundo nombre</label>
                                <input class="form-control" name="middleName" />
                            </div>

                            <div class="col-12 col-md-6">
                                <label class="form-label">Primer apellido</label>
                                <input class="form-control" name="lastName" required />
                            </div>
                            <div class="col-12 col-md-6">
                                <label class="form-label">Segundo apellido</label>
                                <input class="form-control" name="secondLastName" />
                            </div>

                            <div class="col-12 col-md-4">
                                <label class="form-label">Fecha nac.</label>
                                <input type="date" class="form-control" name="birthDate" required />
                            </div>
                            <div class="col-12 col-md-4">
                                <label class="form-label">Sexo</label>
                                <select class="form-select" name="sex" required>
                                    <option value="M">M</option>
                                    <option value="F">F</option>
                                    <option value="I">I</option>
                                </select>
                            </div>
                            <div class="col-12 col-md-4">
                                <label class="form-label">Municipio (código)</label>
                                <input class="form-control" name="municipalityCode" placeholder="11001" required />
                            </div>

                            <div class="col-12 col-md-6">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" name="email" required />
                            </div>
                            <div class="col-12 col-md-6">
                                <label class="form-label">Celular</label>
                                <input class="form-control" name="phone" required />
                            </div>
                        </div>

                        <hr class="my-3">

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a class="btn btn-outline-secondary"
                               th:href="@{/public/book/{id}(id=${professional.id})}">
                                Volver
                            </a>

                            <button type="button" class="btn btn-primary" onclick="submitBooking()">
                                Confirmar y agendar
                            </button>
                        </div>

                        <div id="result" class="mt-3"></div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</main>

<script th:inline="javascript">
    async function submitBooking() {
        const form = document.getElementById('patientForm');
        const data = Object.fromEntries(new FormData(form).entries());

        // Inyectados por Thymeleaf
        data.dateTime = /*[[${dateTime}]]*/ "";

        const professionalId = /*[[${professional.id}]]*/ "";

        const resEl = document.getElementById('result');
        resEl.innerHTML = '';

        try {
            const resp = await fetch(`/api/public/professionals/${professionalId}/book`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const body = await resp.json();

            if (!resp.ok) {
                if (body && body.fields) {
                    const items = Object.entries(body.fields)
                        .map(([k, v]) => `<li><strong>${k}</strong>: ${v}</li>`)
                        .join('');
                    resEl.innerHTML = `
                      <div class="alert alert-danger">
                        <div class="fw-bold">${body.error || 'Validación fallida'}</div>
                        <ul class="mb-0 mt-2">${items}</ul>
                      </div>`;
                } else {
                    resEl.innerHTML = `<div class="alert alert-danger">${body.error || 'Error al agendar'}</div>`;
                }
                return;
            }

            const token = body.accessToken;

            resEl.innerHTML =
                `<div class="alert alert-success">
                     <div class="fw-bold mb-2">Cita agendada.</div>
                     <div class="mb-2">Estado: <strong>${body.status}</strong></div>

                     <div class="d-grid gap-2 d-md-flex">
                       <a class="btn btn-success"
                          href="/public/appointments/${token}/confirm" target="_blank">
                          Confirmar
                       </a>

                       <a class="btn btn-outline-danger"
                          href="/api/public/appointments/${token}/cancel" target="_blank">
                          Cancelar
                       </a>

                       <a class="btn btn-outline-primary"
                          href="/api/public/appointments/${token}/calendar.ics" target="_blank">
                          Descargar .ICS
                       </a>

                       <a class="btn btn-outline-secondary"
                          href="/api/public/appointments/${token}" target="_blank">
                          Ver estado
                       </a>
                     </div>

                     <div class="small text-muted mt-2">
                       (En producción estos links irían en tu correo o WhatsApp. Por ahora se abren en una pestaña nueva.)
                     </div>
               </div>`;
        } catch (e) {
            resEl.innerHTML = `<div class="alert alert-danger">Error de red o servidor.</div>`;
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
