<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="${title}">Confirmación</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">HealthFlow</span>
    </div>
</nav>

<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-7">

            <div class="card shadow-sm">
                <div class="card-body">

                    <h3 class="mb-2" th:text="${title}">¡Cita confirmada!</h3>

                    <div class="alert"
                         th:classappend="${ok} ? ' alert-success' : ' alert-warning'"
                         th:text="${message}">
                        Mensaje
                    </div>

                    <div class="mb-3">
                        <div class="text-muted small">Detalles</div>
                        <div><strong>Estado:</strong> <span th:text="${appointment.status}">CONFIRMADA</span></div>
                        <div><strong>Fecha/Hora (UTC):</strong> <span th:text="${appointment.dateTime}">...</span></div>
                    </div>

                    <div class="d-grid gap-2 d-md-flex">
                        <a class="btn btn-outline-primary" th:href="${icsUrl}" target="_blank">Descargar .ICS</a>
                        <a class="btn btn-outline-secondary" th:href="${statusUrl}" target="_blank">Ver estado (JSON)</a>
                        <a class="btn btn-outline-danger"
                           th:if="${appointment.status.name() != 'CANCELADA' and appointment.status.name() != 'ATENDIDA'}"
                           th:href="${cancelUrl}" target="_blank">
                            Cancelar
                        </a>
                    </div>

                    <hr class="my-3">

                    <div class="small text-muted">
                        Si llegaste aquí por error, vuelve a la página anterior o solicita un nuevo enlace.
                    </div>

                </div>
            </div>

        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
