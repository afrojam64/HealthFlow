<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Agenda tu cita | HealthFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        /* Estilos del calendario (igual que antes) */
        .calendar-day {
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 8px;
            text-align: center;
            padding: 0.5rem;
        }
        .calendar-day:hover {
            background-color: var(--primary-light);
            transform: scale(1.02);
        }
        .calendar-day.selected {
            background-color: var(--primary);
            color: white;
        }
        .calendar-day.disabled {
            color: #ccc;
            cursor: not-allowed;
            background-color: #f5f5f5;
        }
        .slot-btn {
            margin: 0.25rem;
        }
        .professional-info {
            background: linear-gradient(135deg, var(--primary-light), white);
            border-radius: 20px;
            padding: 1rem;
            margin-bottom: 2rem;
        }
        .form-control, .form-select {
            border-radius: 12px;
            padding: 0.75rem 1rem;
        }
        .btn-primary {
            background: var(--primary);
            border: none;
            padding: 0.75rem 2rem;
        }
        .btn-primary:hover {
            background: var(--primary-dark);
        }
    </style>
</head>
<body>
<div th:fragment="contenido" class="container">
    <div class="professional-info">
        <h2 th:text="${professional.fullName}">Dra. Laura Pérez</h2>
        <p class="text-muted" th:text="${professional.specialty}">Medicina General</p>
    </div>

    <div class="row">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <button id="prevMonth" class="btn btn-outline-secondary">&lt;</button>
                        <h4 id="monthYear" class="mb-0">Marzo 2026</h4>
                        <button id="nextMonth" class="btn btn-outline-secondary">&gt;</button>
                    </div>
                    <table class="table table-bordered text-center">
                        <thead>
                        <tr><th>Lun</th><th>Mar</th><th>Mié</th><th>Jue</th><th>Vie</th><th>Sáb</th><th>Dom</th></tr>
                        </thead>
                        <tbody id="calendarBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <h5>Horarios disponibles</h5>
                    <div id="slotsContainer" class="d-flex flex-wrap">
                        <p class="text-muted">Selecciona un día para ver los horarios.</p>
                    </div>
                    <div id="bookingForm" style="display:none;" class="mt-4">
                        <h6>Confirmar cita</h6>
                        <form id="bookForm">
                            <input type="hidden" id="selectedDateTime" name="dateTime">
                            <div class="mb-3">
                                <label for="docType" class="form-label">Tipo de documento</label>
                                <select class="form-select" id="docType" name="docType" required>
                                    <option value="CC">Cédula de ciudadanía</option>
                                    <option value="TI">Tarjeta de identidad</option>
                                    <option value="CE">Cédula de extranjería</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="docNumber" class="form-label">Número de documento</label>
                                <input type="text" class="form-control" id="docNumber" name="docNumber" required>
                            </div>
                            <div class="mb-3">
                                <label for="firstName" class="form-label">Primer nombre</label>
                                <input type="text" class="form-control" id="firstName" name="firstName" required>
                            </div>
                            <div class="mb-3">
                                <label for="lastName" class="form-label">Primer apellido</label>
                                <input type="text" class="form-control" id="lastName" name="lastName" required>
                            </div>
                            <!-- Campos adicionales requeridos por el backend -->
                            <div class="mb-3">
                                <label for="birthDate" class="form-label">Fecha de nacimiento</label>
                                <input type="date" class="form-control" id="birthDate" name="birthDate" required>
                            </div>
                            <div class="mb-3">
                                <label for="sex" class="form-label">Sexo</label>
                                <select class="form-select" id="sex" name="sex" required>
                                    <option value="">Seleccione...</option>
                                    <option value="M">Masculino</option>
                                    <option value="F">Femenino</option>
                                    <option value="U">No especificado</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="municipalityCode" class="form-label">Código de municipio (Resolución 2275)</label>
                                <input type="text" class="form-control" id="municipalityCode" name="municipalityCode" placeholder="Ej: 11001" required>
                                <small class="text-muted">Código DANE del municipio de residencia</small>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Correo electrónico</label>
                                <input type="email" class="form-control" id="email" name="email" required>
                            </div>
                            <div class="mb-3">
                                <label for="phone" class="form-label">Teléfono</label>
                                <input type="tel" class="form-control" id="phone" name="phone">
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Confirmar cita</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const professionalId = /*[[${professionalId}]]*/ 'uuid';
    const slug = /*[[${slug}]]*/ '';

    let currentDate = new Date();
    let selectedDate = null;
    let slots = [];

    function formatDate(date) {
        let y = date.getFullYear();
        let m = String(date.getMonth() + 1).padStart(2, '0');
        let d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    async function loadCalendar(year, month) {
        const firstDay = new Date(year, month, 1);
        const startDayOfWeek = firstDay.getDay();
        let startOffset = startDayOfWeek === 0 ? 6 : startDayOfWeek - 1;
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        let calendarHTML = '<tr>';
        for (let i = 0; i < startOffset; i++) {
            calendarHTML += '<td></td>';
        }
        for (let day = 1; day <= daysInMonth; day++) {
            const cellDate = new Date(year, month, day);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const isPast = cellDate < today;

            let classes = 'calendar-day';
            if (isPast) classes += ' disabled';
            if (selectedDate && cellDate.getTime() === selectedDate.getTime()) classes += ' selected';

            calendarHTML += `<td><div class="${classes}" data-date="${formatDate(cellDate)}">${day}</div></td>`;
            if ((day + startOffset) % 7 === 0) {
                calendarHTML += '</tr><tr>';
            }
        }
        const remainingCells = (7 - ((daysInMonth + startOffset) % 7)) % 7;
        for (let i = 0; i < remainingCells; i++) {
            calendarHTML += '<td></td>';
        }
        calendarHTML += '</tr>';

        document.getElementById('calendarBody').innerHTML = calendarHTML;

        document.querySelectorAll('.calendar-day:not(.disabled)').forEach(dayDiv => {
            dayDiv.addEventListener('click', () => {
                const dateStr = dayDiv.getAttribute('data-date');
                if (dateStr) {
                    const parts = dateStr.split('-');
                    const year = parseInt(parts[0]);
                    const month = parseInt(parts[1]) - 1;
                    const day = parseInt(parts[2]);
                    selectDate(new Date(year, month, day));
                }
            });
        });

        const monthNames = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
        document.getElementById('monthYear').innerText = `${monthNames[month]} ${year}`;
    }

    async function selectDate(date) {
        const normalized = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        selectedDate = normalized;
        const dateStr = formatDate(normalized);

        console.log("📅 Día seleccionado (normalizado):", dateStr);

        document.querySelectorAll('.calendar-day').forEach(div => div.classList.remove('selected'));
        const selectedDiv = document.querySelector(`.calendar-day[data-date="${dateStr}"]`);
        if (selectedDiv) selectedDiv.classList.add('selected');

        const url = `/api/public/professionals/${professionalId}/slots?date=${dateStr}`;
        try {
            const response = await fetch(url);
            const data = await response.json();
            slots = data;
            renderSlots();
        } catch (error) {
            console.error('Error al cargar horarios:', error);
        }
    }

    function renderSlots() {
        const container = document.getElementById('slotsContainer');
        if (!slots.length) {
            container.innerHTML = '<p class="text-muted">No hay horarios disponibles para este día.</p>';
            document.getElementById('bookingForm').style.display = 'none';
            return;
        }
        container.innerHTML = '';
        slots.forEach(slot => {
            const dateTime = new Date(slot);
            const timeStr = dateTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const btn = document.createElement('button');
            btn.className = 'btn btn-outline-primary slot-btn';
            btn.innerText = timeStr;
            btn.addEventListener('click', () => showBookingForm(slot));
            container.appendChild(btn);
        });
        document.getElementById('bookingForm').style.display = 'none';
    }

    function showBookingForm(dateTimeStr) {
        document.getElementById('selectedDateTime').value = dateTimeStr;
        document.getElementById('bookingForm').style.display = 'block';
        document.getElementById('bookingForm').scrollIntoView({ behavior: 'smooth' });
    }

    // Interceptar envío del formulario
    const bookForm = document.getElementById('bookForm');
    if (bookForm) {
        bookForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Recoger datos
            const formData = new FormData(bookForm);
            const data = {
                docType: formData.get('docType'),
                docNumber: formData.get('docNumber'),
                firstName: formData.get('firstName'),
                lastName: formData.get('lastName'),
                birthDate: formData.get('birthDate'),
                sex: formData.get('sex'),
                municipalityCode: formData.get('municipalityCode'),
                email: formData.get('email'),
                phone: formData.get('phone'),
                dateTime: formData.get('dateTime')
            };

            // Validar campos requeridos
            if (!data.birthDate || !data.sex || !data.municipalityCode) {
                alert('Por favor complete todos los campos obligatorios (fecha de nacimiento, sexo, código de municipio).');
                return;
            }

            try {
                const response = await fetch(`/api/public/professionals/${professionalId}/book`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || 'Error al reservar la cita');
                }

                const result = await response.json();
                alert('Cita agendada correctamente. Revisa tu correo para confirmar.');
                // Opcional: redirigir a una página de éxito
                window.location.href = `/public/public-appointment-confirm?token=${result.accessToken}`;
            } catch (err) {
                alert('Error: ' + err.message);
            }
        });
    }

    document.getElementById('prevMonth').addEventListener('click', () => {
        currentDate.setMonth(currentDate.getMonth() - 1);
        loadCalendar(currentDate.getFullYear(), currentDate.getMonth());
        selectedDate = null;
        document.getElementById('slotsContainer').innerHTML = '<p class="text-muted">Selecciona un día para ver los horarios.</p>';
        document.getElementById('bookingForm').style.display = 'none';
    });
    document.getElementById('nextMonth').addEventListener('click', () => {
        currentDate.setMonth(currentDate.getMonth() + 1);
        loadCalendar(currentDate.getFullYear(), currentDate.getMonth());
        selectedDate = null;
        document.getElementById('slotsContainer').innerHTML = '<p class="text-muted">Selecciona un día para ver los horarios.</p>';
        document.getElementById('bookingForm').style.display = 'none';
    });

    loadCalendar(currentDate.getFullYear(), currentDate.getMonth());
</script>
</body>
</html>
