<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} ?: 'HealthFlow'">HealthFlow - Gestión Clínica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --primary: #2A7F6E; --primary-dark: #1E5F51; --primary-light: #E8F5F2; --accent: #4A9F8E;
            --gray-50: #F9FAFB; --gray-100: #F3F4F6; --gray-200: #E5E7EB;
            --gray-600: #4B5563; --gray-800: #1F2937;
        }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background-color: var(--gray-50); }
        .navbar-health { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .navbar-health .navbar-brand { font-weight: 600; font-size: 1.5rem; }
        .navbar-health .nav-link { color: rgba(255, 255, 255, 0.9); transition: all 0.3s; }
        .navbar-health .nav-link:hover { color: white; background: rgba(255, 255, 255, 0.1); border-radius: 8px; }
        .sidebar { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); padding: 1rem 0; position: sticky; top: 20px; }
        .sidebar .list-group-item { border: none; padding: 0.8rem 1.5rem; color: var(--gray-600); font-weight: 500; transition: all 0.3s; border-radius: 8px !important; margin: 0.2rem 0.8rem; }
        .sidebar .list-group-item i { margin-right: 10px; width: 24px; color: var(--primary); }
        .sidebar .list-group-item:hover { background: var(--primary-light); color: var(--primary-dark); transform: translateX(5px); }
        .sidebar .list-group-item.active { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; box-shadow: 0 4px 8px rgba(42, 127, 110, 0.3); }
        .sidebar .list-group-item.active i { color: white; }
        .footer { background: white; padding: 1.5rem; margin-top: 2rem; border-radius: 16px 16px 0 0; box-shadow: 0 -4px 6px -1px rgba(0, 0, 0, 0.05); text-align: center; color: var(--gray-600); }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-health">
    <div class="container-fluid">
        <a class="navbar-brand text-white" href="/dashboard"><i class="bi bi-heart-pulse-fill me-2"></i>HealthFlow</a>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle text-white" href="#" role="button" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle me-1"></i><span th:text="${username}">Usuario</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="#"><i class="bi bi-person"></i> Mi Perfil</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/logout}" method="post">
                                <button type="submit" class="dropdown-item"><i class="bi bi-box-arrow-right"></i> Cerrar Sesión</button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>
<div class="container-fluid mt-4">
    <div class="row">
        <div class="col-md-2">
            <div class="sidebar">
                <div class="list-group">
                    <a href="/dashboard" class="list-group-item list-group-item-action" th:classappend="${currentPage == 'dashboard' ? 'active' : ''}"><i class="bi bi-speedometer2"></i> Dashboard</a>
                    <a th:href="@{/doctor/agenda}" class="list-group-item list-group-item-action" th:classappend="${currentPage == 'agenda' ? 'active' : ''}"><i class="bi bi-calendar-week"></i> Agenda</a>
                    <a href="#" class="list-group-item list-group-item-action"><i class="bi bi-people"></i> Pacientes</a>
                    <a href="#" class="list-group-item list-group-item-action"><i class="bi bi-file-text"></i> Consultas</a>
                    <a href="#" class="list-group-item list-group-item-action"><i class="bi bi-graph-up"></i> Reportes RIPS</a>
                    <a href="#" class="list-group-item list-group-item-action"><i class="bi bi-gear"></i> Configuración</a>
                </div>
            </div>
        </div>
        <div class="col-md-10">
            <!-- CORRECTO: Simplemente reemplaza este div con el fragmento que se le pasa -->
            <div th:replace="${content}"></div>
        </div>
    </div>
</div>
<footer class="footer">
    <p class="mb-0">© 2026 HealthFlow - Gestión Clínica Digital</p>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
