<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} ?: 'HealthFlow - Agenda tu cita'">HealthFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --primary: #2A7F6E;
            --primary-dark: #1E5F51;
            --primary-light: #E8F5F2;
            --gray-50: #F9FAFB;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-600: #4B5563;
            --gray-800: #1F2937;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--gray-50);
        }
        .navbar-health {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .navbar-health .navbar-brand {
            font-weight: 600;
            font-size: 1.5rem;
        }
        .footer {
            background: white;
            padding: 1.5rem;
            margin-top: 2rem;
            border-radius: 16px 16px 0 0;
            box-shadow: 0 -4px 6px -1px rgba(0, 0, 0, 0.05);
            text-align: center;
            color: var(--gray-600);
        }
        .main-content {
            min-height: calc(100vh - 140px);
            padding: 2rem;
        }
        .btn-primary {
            background: var(--primary);
            border: none;
        }
        .btn-primary:hover {
            background: var(--primary-dark);
        }
        .professional-info {
            background: linear-gradient(135deg, var(--primary-light), white);
            border-radius: 20px;
            padding: 1rem;
            margin-bottom: 2rem;
        }
        .calendar-day {
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 8px;
            text-align: center;
            padding: 0.5rem;
        }
        .calendar-day:hover {
            background-color: var(--primary-light);
            transform: scale(1.02);
        }
        .calendar-day.selected {
            background-color: var(--primary);
            color: white;
        }
        .calendar-day.disabled {
            color: #ccc;
            cursor: not-allowed;
            background-color: #f5f5f5;
        }
        .slot-btn {
            margin: 0.25rem;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-health">
    <div class="container-fluid">
        <a class="navbar-brand text-white" href="/">
            <i class="bi bi-heart-pulse-fill me-2"></i>
            HealthFlow
        </a>
    </div>
</nav>

<div class="main-content">
    <div th:replace="${contenido}"></div>
</div>

<footer class="footer">
    <p class="mb-0">© 2026 HealthFlow - Gestión Clínica Digital</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
