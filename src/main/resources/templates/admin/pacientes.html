<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary"><i class="bi bi-person-badge me-2"></i>Pacientes</h2>
    </div>
    <form method="get" class="mb-3">
        <div class="input-group">
            <input type="text" name="search" class="form-control" placeholder="Buscar por nombre o documento" th:value="${search}">
            <button class="btn btn-primary" type="submit">Buscar</button>
            <a th:href="@{/admin/pacientes}" class="btn btn-secondary">Limpiar</a>
        </div>
    </form>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead class="table-light"><tr><th>Nombre</th><th>Documento</th><th>Email</th><th>Teléfono</th></tr></thead>
            <tbody>
            <tr th:each="p : ${pacientes}">
                <td th:text="${p.firstName + ' ' + p.lastName}">Juan Pérez</td>
                <td th:text="${p.docNumber}">12345678</td>
                <td th:text="${p.email}">correo@mail.com</td>
                <td th:text="${p.phone}">3001234567</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
