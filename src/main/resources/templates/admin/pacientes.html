<div th:fragment="content">
    <div class="px-4 py-8">
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-green-600 border-l-4 border-green-500 pl-3">Pacientes del Sistema</h1>
            <p class="text-gray-500 mt-1 text-sm">Gestión de pacientes registrados en HealthFlow</p>
        </div>

        <!-- Filtro de búsqueda (opcional, si quieres mantenerlo) -->
        <div class="mb-4">
            <form method="get" class="flex gap-2">
                <input type="text" name="search" class="border border-gray-300 rounded-md px-3 py-2 text-sm w-64" placeholder="Buscar por nombre o documento" th:value="${search}">
                <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded-md text-sm">Buscar</button>
                <a th:href="@{/admin/pacientes}" class="bg-gray-300 text-gray-800 px-4 py-2 rounded-md text-sm">Limpiar</a>
            </form>
        </div>

        <div class="bg-white rounded-lg shadow-md overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                    <tr>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Nombre Completo</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Documento</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Email</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Teléfono</th>
                        <th scope="col" class="px-6 py-3 text-center text-xs font-semibold text-gray-700 uppercase tracking-wider">Acciones</th>
                    </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200">
                    <tr th:each="paciente : ${pacientes}" class="hover:bg-green-50 transition-colors duration-150">
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900" th:text="${paciente.firstName + ' ' + paciente.lastName}">Nombre</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600" th:text="${paciente.docNumber}">12345678</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600" th:text="${paciente.email}">correo@example.com</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600" th:text="${paciente.phone}">3001234567</td>
                        <td class="px-6 py-4 whitespace-nowrap text-center text-sm">
                            <button class="inline-flex items-center gap-2 border border-green-500 text-green-600 bg-white hover:bg-green-50 px-3 py-1.5 rounded-md transition-colors duration-150"
                                    title="Ver historial clínico"
                                    onclick="alert('Función en desarrollo: Historial de ' + '[[${paciente.firstName}]]')">
                                <i class="fas fa-chart-line text-sm"></i>
                                <span class="hidden sm:inline text-xs font-medium">Estadísticas</span>
                            </button>
                        </td>
                    </tr>
                    <tr th:if="${pacientes.isEmpty()}">
                        <td colspan="5" class="px-6 py-8 text-center text-gray-500">
                            <i class="fas fa-users fa-2x mb-2 block"></i>
                            No hay pacientes registrados
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
