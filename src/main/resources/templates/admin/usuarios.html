<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Gestión de Usuarios</title>
    <!-- Font Awesome 6 (iconos) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
<div class="container mx-auto px-4 py-8">
    <!-- Título de la página con estilo verde -->
    <div class="mb-6">
        <h1 class="text-2xl font-bold text-green-600 border-l-4 border-green-500 pl-3">Usuarios del Sistema</h1>
        <p class="text-gray-500 mt-1 text-sm">Gestión de usuarios registrados en HealthFlow</p>
    </div>

    <!-- Tarjeta contenedora de la tabla -->
    <div class="bg-white rounded-lg shadow-md overflow-hidden">
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                <tr>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Usuario</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Email</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Rol</th>
                    <th scope="col" class="px-6 py-3 text-center text-xs font-semibold text-gray-700 uppercase tracking-wider">Activo</th>
                    <th scope="col" class="px-6 py-3 text-center text-xs font-semibold text-gray-700 uppercase tracking-wider">Acciones</th>
                </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                <tr th:each="usuario : ${usuarios}" class="hover:bg-green-50 transition-colors duration-150">
                    <!-- Username -->
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900" th:text="${usuario.username}">usuario</td>

                    <!-- Email -->
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600" th:text="${usuario.email}">email@example.com</td>

                    <!-- Rol con badge de color (usuario.role es String directamente) -->
                    <td class="px-6 py-4 whitespace-nowrap">
                            <span th:if="${usuario.role == 'ADMIN'}" class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-red-100 text-red-800">
                                ADMIN
                            </span>
                        <span th:if="${usuario.role == 'MEDICO'}" class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-blue-100 text-blue-800">
                                MÉDICO
                            </span>
                        <span th:if="${usuario.role == 'ASISTENTE'}" class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-purple-100 text-purple-800">
                                ASISTENTE
                            </span>
                        <span th:if="${usuario.role != 'ADMIN' and usuario.role != 'MEDICO' and usuario.role != 'ASISTENTE'}"
                              class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-gray-100 text-gray-800"
                              th:text="${usuario.role}">
                                OTRO
                            </span>
                    </td>

                    <!-- Activo (icono check o x) -->
                    <td class="px-6 py-4 whitespace-nowrap text-center text-sm">
                            <span th:if="${usuario.active}" class="text-green-600">
                                <i class="fas fa-check-circle text-lg"></i>
                            </span>
                        <span th:unless="${usuario.active}" class="text-red-600">
                                <i class="fas fa-times-circle text-lg"></i>
                            </span>
                    </td>

                    <!-- Acciones: botón con icono y borde verde -->
                    <td class="px-6 py-4 whitespace-nowrap text-center text-sm">
                        <button class="inline-flex items-center gap-2 border border-green-500 text-green-600 bg-white hover:bg-green-50 px-3 py-1.5 rounded-md transition-colors duration-150"
                                title="Ver detalles (solo lectura)"
                                onclick="alert('Función en desarrollo: Detalles del usuario ' + '[[${usuario.username}]]')">
                            <i class="fas fa-chart-line text-sm"></i>
                            <span class="hidden sm:inline text-xs font-medium">Ver Detalles</span>
                        </button>
                    </td>
                </tr>
                <tr th:if="${usuarios.isEmpty()}">
                    <td colspan="5" class="px-6 py-8 text-center text-gray-500">
                        <i class="fas fa-users fa-2x mb-2 block"></i>
                        No hay usuarios registrados
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Footer -->
    <footer class="mt-6 text-center text-gray-400 text-xs">
        © 2026 HealthFlow - Panel de Administración | Datos seguros bajo Resolución 2275
    </footer>
</div>
</body>
</html>
