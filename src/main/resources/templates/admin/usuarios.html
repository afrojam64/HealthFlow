<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary"><i class="bi bi-people me-2"></i>Usuarios</h2>
    </div>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead class="table-light">
            <tr><th>Usuario</th><th>Email</th><th>Rol</th><th>Activo</th><th>Acciones</th></tr>
            </thead>
            <tbody>
            <tr th:each="u : ${usuarios}">
                <td th:text="${u.username}">user</td>
                <td th:text="${u.email}">email</td>
                <td><span class="badge bg-secondary" th:text="${u.role}"></span></td>
                <td><i th:if="${u.active}" class="bi bi-check-circle-fill text-success"></i><i th:unless="${u.active}" class="bi bi-x-circle-fill text-danger"></i></td>
                <td><a th:href="@{/admin/usuarios/{id}(id=${u.id})}" class="btn btn-sm btn-outline-secondary">Ver</a> (solo lectura)</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
