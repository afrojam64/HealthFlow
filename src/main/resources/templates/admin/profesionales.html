<div th:fragment="content">
    <!-- Título y subtítulo (igual que usuarios) -->
    <div class="mb-6">
        <h1 class="text-2xl font-bold text-green-600 border-l-4 border-green-500 pl-3">Profesionales del Sistema</h1>
        <p class="text-gray-500 mt-1 text-sm">Gestión de profesionales médicos registrados en HealthFlow</p>
    </div>

    <!-- Tarjeta contenedora de la tabla -->
    <div class="bg-white rounded-lg shadow-md overflow-hidden">
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                <tr>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Nombre</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Especialidad</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Registro Médico</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Slug</th>
                    <th scope="col" class="px-6 py-3 text-center text-xs font-semibold text-gray-700 uppercase tracking-wider">Acciones</th>
                </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                <tr th:each="p : ${profesionales}" class="hover:bg-green-50 transition-colors duration-150">
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900" th:text="${p.fullName}">Dr. Pérez</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600" th:text="${p.specialty}">Medicina General</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600" th:text="${p.medicalRegistry}">RM-12345</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-mono text-gray-500" th:text="${p.slug}">slug</td>
                    <td class="px-6 py-4 whitespace-nowrap text-center text-sm">
                        <a th:href="@{/admin/profesionales/{slug}/estadisticas(slug=${p.slug})}"
                           class="inline-flex items-center gap-2 border border-green-500 text-green-600 bg-white hover:bg-green-50 px-3 py-1.5 rounded-md transition-colors duration-150"
                           title="Ver estadísticas del profesional">
                            <i class="fas fa-chart-line text-sm"></i>
                            <span class="hidden sm:inline text-xs font-medium">Estadísticas</span>
                        </a>
                    </td>
                </tr>
                <tr th:if="${profesionales.isEmpty()}">
                    <td colspan="5" class="px-6 py-8 text-center text-gray-500">
                        <i class="fas fa-user-md fa-2x mb-2 block"></i>
                        No hay profesionales registrados
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
