<div th:fragment="content">
    <div class="px-4 py-8">
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-green-600 border-l-4 border-green-500 pl-3">Citas del Sistema</h1>
            <p class="text-gray-500 mt-1 text-sm">Gestión de citas médicas registradas en HealthFlow</p>
        </div>

        <!-- Filtros -->
        <div class="bg-white rounded-lg shadow-md p-4 mb-6">
            <form method="get" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Médico</label>
                    <input type="text" name="medico" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm" placeholder="Nombre del médico" th:value="${param.medico}">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Estado</label>
                    <select name="estado" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
                        <option value="">Todos los estados</option>
                        <option th:each="e : ${T(com.healthflow.domain.AppointmentStatus).values()}" th:value="${e.name()}" th:text="${e.displayName}" th:selected="${param.estado != null and param.estado[0] == e.name()}"></option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Fecha</label>
                    <input type="date" name="fecha" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm" th:value="${param.fecha}">
                </div>
                <div class="flex items-end gap-2">
                    <button type="submit" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-md text-sm">Filtrar</button>
                    <a th:href="@{/admin/citas}" class="bg-gray-300 hover:bg-gray-400 text-gray-800 px-4 py-2 rounded-md text-sm">Limpiar</a>
                </div>
            </form>
        </div>

        <div class="bg-white rounded-lg shadow-md overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                    <tr>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Fecha/Hora</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Paciente</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Médico</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Estado</th>
                        <th scope="col" class="px-6 py-3 text-center text-xs font-semibold text-gray-700 uppercase tracking-wider">Acciones</th>
                    </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200">
                    <tr th:each="c : ${citas}" class="hover:bg-green-50 transition-colors duration-150">
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900" th:text="${#temporals.format(c.dateTime, 'dd/MM/yyyy HH:mm')}">01/01/2026 10:00</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600" th:text="${c.patient.firstName + ' ' + c.patient.lastName}">Paciente</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600" th:text="${c.professional.fullName}">Dr. Pérez</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm">
                            <span th:if="${c.status.name() == 'CONFIRMADA'}" class="px-2 py-1 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800">Confirmada</span>
                            <span th:if="${c.status.name() == 'PENDIENTE'}" class="px-2 py-1 inline-flex text-xs leading-5 font-semibold rounded-full bg-yellow-100 text-yellow-800">Pendiente</span>
                            <span th:if="${c.status.name() == 'ATENDIDA'}" class="px-2 py-1 inline-flex text-xs leading-5 font-semibold rounded-full bg-blue-100 text-blue-800">Atendida</span>
                            <span th:if="${c.status.name() == 'CANCELADA'}" class="px-2 py-1 inline-flex text-xs leading-5 font-semibold rounded-full bg-red-100 text-red-800">Cancelada</span>
                            <span th:if="${c.status.name() == 'NO_ATENDIDA'}" class="px-2 py-1 inline-flex text-xs leading-5 font-semibold rounded-full bg-gray-100 text-gray-800">No Atendida</span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-center text-sm">
                            <button class="inline-flex items-center gap-2 border border-green-500 text-green-600 bg-white hover:bg-green-50 px-3 py-1.5 rounded-md transition-colors duration-150"
                                    title="Ver detalles de la cita"
                                    onclick="alert('Función en desarrollo: Detalles de cita de ' + '[[${c.patient.firstName}]]')">
                                <i class="fas fa-chart-line text-sm"></i>
                                <span class="hidden sm:inline text-xs font-medium">Estadísticas</span>
                            </button>
                        </td>
                    </tr>
                    <tr th:if="${citas.isEmpty()}">
                        <td colspan="5" class="px-6 py-8 text-center text-gray-500">
                            <i class="fas fa-calendar-week fa-2x mb-2 block"></i>
                            No hay citas registradas
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
