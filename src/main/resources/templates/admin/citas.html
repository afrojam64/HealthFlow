<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary"><i class="bi bi-calendar-week me-2"></i>Citas</h2>
    </div>
    <form method="get" class="row g-3 mb-3">
        <div class="col-md-3">
            <input type="text" name="medico" class="form-control" placeholder="Médico" th:value="${param.medico}">
        </div>
        <div class="col-md-3">
            <select name="estado" class="form-select">
                <option value="">Todos los estados</option>
                <option th:each="e : ${T(com.healthflow.domain.AppointmentStatus).values()}" th:value="${e.name()}" th:text="${e.displayName}"></option>
            </select>
        </div>
        <div class="col-md-3">
            <input type="date" name="fecha" class="form-control" th:value="${param.fecha}">
        </div>
        <div class="col-md-3">
            <button type="submit" class="btn btn-primary w-100">Filtrar</button>
        </div>
    </form>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead class="table-light"><tr><th>Fecha/Hora</th><th>Paciente</th><th>Médico</th><th>Estado</th></tr></thead>
            <tbody>
            <tr th:each="c : ${citas}">
                <td th:text="${#temporals.format(c.dateTime, 'dd/MM/yyyy HH:mm')}">01/01/2026 10:00</td>
                <td th:text="${c.patient.firstName + ' ' + c.patient.lastName}">Paciente</td>
                <td th:text="${c.professional.fullName}">Dr. Pérez</td>
                <td><span class="badge" th:classappend="${c.status.name() == 'CONFIRMADA' ? 'bg-success' : (c.status.name() == 'PENDIENTE' ? 'bg-warning' : 'bg-secondary')}" th:text="${c.status.displayName}"></span></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
