<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>
<div th:fragment="contenido">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary">
            <i class="bi bi-gear me-2"></i>Configuración
        </h2>
    </div>

    <!-- Pestañas -->
    <div class="card">
        <div class="card-header">
            <ul class="nav nav-tabs card-header-tabs" id="configTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="cambiar-password-tab" data-bs-toggle="tab" data-bs-target="#cambiar-password" type="button" role="tab">Cambiar contraseña</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="asistentes-tab" data-bs-toggle="tab" data-bs-target="#asistentes" type="button" role="tab">Crear asistente</button>
                </li>
            </ul>
        </div>
        <div class="card-body">
            <div class="tab-content">
                <!-- Cambiar contraseña -->
                <div class="tab-pane fade show active" id="cambiar-password" role="tabpanel">
                    <form method="post" th:action="@{/doctor/configuracion/cambiar-password}" class="mt-3">
                        <div class="mb-3">
                            <label for="currentPassword" class="form-label">Contraseña actual</label>
                            <input type="password" class="form-control" id="currentPassword" name="currentPassword" required>
                        </div>
                        <div class="mb-3">
                            <label for="newPassword" class="form-label">Nueva contraseña</label>
                            <input type="password" class="form-control" id="newPassword" name="newPassword" required>
                        </div>
                        <div class="mb-3">
                            <label for="confirmPassword" class="form-label">Confirmar nueva contraseña</label>
                            <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Actualizar contraseña</button>
                    </form>
                </div>

                <!-- Crear asistente -->
                <div class="tab-pane fade" id="asistentes" role="tabpanel">
                    <form method="post" th:action="@{/doctor/configuracion/crear-asistente}" class="mt-3">
                        <div class="mb-3">
                            <label for="username" class="form-label">Nombre de usuario</label>
                            <input type="text" class="form-control" id="username" name="username" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Correo electrónico</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Contraseña temporal</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Permisos del asistente</label>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="permisos" value="VER_CALENDARIO" id="permCalendario">
                                <label class="form-check-label" for="permCalendario">Ver calendario de citas</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="permisos" value="CONFIGURAR_AGENDA" id="permAgenda">
                                <label class="form-check-label" for="permAgenda">Configurar agenda</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="permisos" value="SUBIR_DOCUMENTOS" id="permDocumentos">
                                <label class="form-check-label" for="permDocumentos">Subir documentos a pacientes</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="permisos" value="VER_PACIENTES" id="permPacientes">
                                <label class="form-check-label" for="permPacientes">Ver lista de pacientes</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="permisos" value="CREAR_CITAS" id="permCitas">
                                <label class="form-check-label" for="permCitas">Crear citas</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="permisos" value="GENERAR_RIPS" id="permRips">
                                <label class="form-check-label" for="permRips">Generar reportes RIPS</label>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary">Crear asistente</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <h3 class="mt-4">Mis Asistentes</h3>
    <div id="asistentesList"></div>
</div>

<script>
    // Lista de todos los permisos disponibles (debe coincidir con los del backend)
    const TODOS_PERMISOS = [
        { valor: "VER_CALENDARIO", label: "Ver Calendario" },
        { valor: "CONFIGURAR_AGENDA", label: "Configurar Agenda" },
        { valor: "SUBIR_DOCUMENTOS", label: "Subir Documentos" },
        { valor: "VER_PACIENTES", label: "Ver Pacientes" },
        { valor: "CREAR_CITAS", label: "Crear Citas" },
        { valor: "GENERAR_RIPS", label: "Generar RIPS" }
    ];

    function cargarAsistentes() {
        fetch('/doctor/configuracion/asistentes')
            .then(res => res.json())
            .then(asistentes => {
                let html = '<table class="table table-bordered table-striped mt-2">';
                html += '<thead><tr><th>Usuario</th><th>Permisos</th><th>Acciones</th></tr></thead><tbody>';
                if (asistentes.length === 0) {
                    html += '<tr><td colspan="3">No hay asistentes registrados.</td></tr>';
                } else {
                    asistentes.forEach(ast => {
                        // Generar checkboxes para todos los permisos
                        let checkboxesHtml = '';
                        TODOS_PERMISOS.forEach(p => {
                            let checked = ast.permisos && ast.permisos.includes(p.valor) ? 'checked' : '';
                            checkboxesHtml += `
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input permiso-check" type="checkbox" value="${p.valor}" data-asistente="${ast.id}" ${checked}>
                                    <label class="form-check-label">${p.label}</label>
                                </div>
                            `;
                        });
                        html += `
                            <tr>
                                <td>${escapeHtml(ast.nombre)}</td>
                                <td>${checkboxesHtml}</td>
                                <td><button class="btn btn-sm btn-primary guardar-permisos" data-id="${ast.id}">Guardar cambios</button></td>
                            </tr>
                        `;
                    });
                }
                html += '</tbody></table>';
                document.getElementById('asistentesList').innerHTML = html;

                // Añadir event listeners a todos los botones "Guardar cambios"
                document.querySelectorAll('.guardar-permisos').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        const asistenteId = this.getAttribute('data-id');
                        guardarPermisos(asistenteId);
                    });
                });
            })
            .catch(error => {
                console.error('Error cargando asistentes:', error);
                document.getElementById('asistentesList').innerHTML = '<div class="alert alert-danger">Error al cargar los asistentes.</div>';
            });
    }

    function guardarPermisos(asistenteId) {
        const permisosSeleccionados = [];
        document.querySelectorAll(`.permiso-check[data-asistente="${asistenteId}"]:checked`).forEach(cb => {
            permisosSeleccionados.push(cb.value);
        });

        // Obtener token CSRF
        const csrfToken = document.querySelector('meta[name="_csrf"]')?.content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content;

        fetch(`/doctor/configuracion/asistentes/${asistenteId}/permisos`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                [csrfHeader]: csrfToken   // <- importante
            },
            body: JSON.stringify(permisosSeleccionados)
        })
            .then(res => {
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return res.json();
            })
            .then(data => {
                alert(data.message || 'Permisos actualizados correctamente');
                cargarAsistentes(); // recargar la tabla para reflejar cambios
            })
            .catch(error => {
                console.error('Error guardando permisos:', error);
                alert('Error al guardar los permisos. Asegúrate de tener sesión activa.');
            });
    }

    // Función para evitar inyección HTML en el nombre
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    // Ejecutar la carga cuando el DOM esté listo
    document.addEventListener('DOMContentLoaded', cargarAsistentes);
</script>
</body>
</html>
