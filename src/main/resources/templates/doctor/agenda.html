<div th:fragment="contenido">
    <!-- Header con información del médico -->
    <div class="header-bar">
        <div>
            <h2 class="mb-1">
                <i class="bi bi-calendar-week text-primary me-2"></i>
                Mi Agenda
            </h2>
            <p class="text-muted mb-0">
                <i class="bi bi-person-circle me-1"></i>
                <span th:text="${professionalName}">Dr. García</span>
            </p>
        </div>
        <div class="mt-2">
            <small class="text-muted">Enlace para pacientes:</small>
            <a th:href="@{/public/{slug}(slug=${professionalSlug})}" target="_blank" class="text-primary ms-2">
                <i class="bi bi-link-45deg"></i>
                <span th:text="'http://localhost:8080/public/' + ${professionalSlug}"></span>
            </a>
        </div>
    </div>

    <!-- Navegación de mes -->
    <div class="month-nav">
        <button id="prevMonthBtn" onclick="cambiarMes(-1)">← <span th:text="${prevMonthName}">Febrero</span></button>
        <h2 id="monthTitle" th:text="${currentMonthName} + ' ' + ${currentYear}">Marzo 2026</h2>
        <button id="nextMonthBtn" onclick="cambiarMes(1)"><span th:text="${nextMonthName}">Abril</span> →</button>
    </div>

    <!-- Calendario mensual -->
    <table class="calendar">
        <thead>
        <tr>
            <th>Lunes</th>
            <th>Martes</th>
            <th>Miércoles</th>
            <th>Jueves</th>
            <th>Viernes</th>
            <th>Sábado</th>
            <th>Domingo</th>
            <th>Seleccionar</th>
        </tr>
        </thead>
        <tbody id="calendarBody">
        <!-- Las filas se generarán dinámicamente con JavaScript -->
        </tbody>
    </table>

    <!-- Contador de semanas seleccionadas -->
    <div class="selected-count" id="selectedCount">Semanas seleccionadas: 0</div>

    <!-- Panel de configuración -->
    <div class="config-section">
        <div class="config-option">
            <label>
                <input type="checkbox" id="sameFranjaCheckbox">
                <span>Aplicar misma franja horaria a todos los días de las semanas seleccionadas</span>
            </label>
            <div class="time-inputs" id="timeInputs" style="display: none;">
                <span>Hora Inicio</span>
                <input type="time" id="startTime" value="09:00">
                <span>Hora Fin</span>
                <input type="time" id="endTime" value="17:00">
            </div>
        </div>

        <!-- Botón para mostrar configuración por día -->
        <button class="btn-secondary" id="showPerDayBtn" style="display: none;">Configurar por día</button>

        <!-- Panel de configuración por día -->
        <div id="perDayPanel" class="per-day-panel" style="display: none;">
            <h5 class="mb-3">Configuración individual por día</h5>
            <table class="per-day-table">
                <thead>
                <tr>
                    <th>Semana</th>
                    <th>Día</th>
                    <th>Fecha</th>
                    <th>Hora Inicio</th>
                    <th>Hora Fin</th>
                    <th>Habilitar</th>
                </tr>
                </thead>
                <tbody id="perDayRows">
                <!-- Se llenará con JavaScript -->
                </tbody>
            </table>
        </div>

        <!-- Botón guardar -->
        <button class="btn-save" id="saveBtn">Guardar disponibilidad</button>
    </div>

    <!-- Modal para mensajes -->
    <div class="modal fade" id="mensajeModal" tabindex="-1" aria-labelledby="mensajeModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header" id="modalHeader">
                    <h5 class="modal-title" id="mensajeModalLabel">Mensaje</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body" id="modalBody">
                    Texto del mensaje
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Aceptar</button>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        // Variables globales (inyectadas desde el modelo)
        let currentYear = /*[[${currentYear}]]*/ 2026;
        let currentMonth = /*[[${currentMonth}]]*/ 2;
        const startOfCurrentWeekStr = /*[[${startOfCurrentWeek}]]*/ '2026-03-02';
        const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        const dayNames = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado", "Domingo"];

        // Elementos del DOM
        const calendarBody = document.getElementById('calendarBody');
        const selectedCountSpan = document.getElementById('selectedCount');
        const sameFranjaCheckbox = document.getElementById('sameFranjaCheckbox');
        const timeInputsDiv = document.getElementById('timeInputs');
        const showPerDayBtn = document.getElementById('showPerDayBtn');
        const perDayPanel = document.getElementById('perDayPanel');
        const perDayRows = document.getElementById('perDayRows');
        const saveBtn = document.getElementById('saveBtn');
        const prevMonthBtn = document.getElementById('prevMonthBtn');
        const nextMonthBtn = document.getElementById('nextMonthBtn');

        // Generar calendario
        function generarCalendario(year, month) {
            let firstDay = new Date(year, month, 1).getDay();
            let startOffset = (firstDay === 0) ? 6 : firstDay - 1;
            let daysInMonth = new Date(year, month + 1, 0).getDate();
            let weeks = [];
            let week = [];
            for (let i = 0; i < startOffset; i++) week.push(null);
            for (let d = 1; d <= daysInMonth; d++) {
                week.push(d);
                if (week.length === 7) {
                    weeks.push(week);
                    week = [];
                }
            }
            if (week.length > 0) {
                while (week.length < 7) week.push(null);
                weeks.push(week);
            }
            let html = '';
            weeks.forEach((week, index) => {
                html += '<tr class="week-row">';
                week.forEach(day => html += `<td class="day-number">${day !== null ? day : ''}</td>`);
                const firstDayInRow = week.find(d => d);
                if (firstDayInRow) {
                    const representativeDate = new Date(year, month, firstDayInRow);
                    const representativeDateStr = representativeDate.toISOString().split('T')[0];
                    const tempDate = new Date(representativeDate);
                    const dayOfWeek = tempDate.getDay();
                    const diff = tempDate.getDate() - dayOfWeek + (dayOfWeek === 0 ? -6 : 1);
                    const mondayDate = new Date(tempDate.setDate(diff));
                    const mondayDateStr = mondayDate.toISOString().split('T')[0];
                    const disabledAttr = mondayDateStr < startOfCurrentWeekStr ? 'disabled' : '';
                    html += `<td class="week-selector-cell"><input type="checkbox" class="week-checkbox" data-week="${representativeDateStr}" ${disabledAttr}></td>`;
                } else {
                    html += `<td class="week-selector-cell"></td>`;
                }
                html += '</tr>';
            });
            calendarBody.innerHTML = html;

            let prevMonth = month - 1;
            let prevYear = year;
            if (prevMonth < 0) { prevMonth = 11; prevYear--; }
            let nextMonth = month + 1;
            let nextYear = year;
            if (nextMonth > 11) { nextMonth = 0; nextYear++; }
            prevMonthBtn.innerHTML = `← ${monthNames[prevMonth]}`;
            nextMonthBtn.innerHTML = `${monthNames[nextMonth]} →`;
            document.getElementById('monthTitle').innerText = monthNames[month] + ' ' + year;
            document.querySelectorAll('.week-checkbox').forEach(cb => cb.addEventListener('change', updateSelectedCount));
            updateSelectedCount();
        }

        function cambiarMes(delta) {
            currentMonth += delta;
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            else if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            generarCalendario(currentYear, currentMonth);
        }

        function updateSelectedCount() {
            const checkboxes = document.querySelectorAll('.week-checkbox');
            const selected = Array.from(checkboxes).filter(cb => cb.checked).length;
            selectedCountSpan.textContent = `Semanas seleccionadas: ${selected}`;
            if (selected > 0) {
                if (!sameFranjaCheckbox.checked) showPerDayBtn.style.display = 'inline-block';
                else showPerDayBtn.style.display = 'none';
            } else {
                showPerDayBtn.style.display = 'none';
                perDayPanel.style.display = 'none';
            }
        }

        sameFranjaCheckbox.addEventListener('change', function() {
            if (this.checked) {
                timeInputsDiv.style.display = 'flex';
                showPerDayBtn.style.display = 'none';
                perDayPanel.style.display = 'none';
            } else {
                timeInputsDiv.style.display = 'none';
                const selected = document.querySelectorAll('.week-checkbox:checked').length;
                if (selected > 0) showPerDayBtn.style.display = 'inline-block';
            }
        });

        showPerDayBtn.addEventListener('click', function() {
            const checkboxes = document.querySelectorAll('.week-checkbox:checked');
            if (checkboxes.length === 0) {
                alert('Selecciona al menos una semana.');
                return;
            }
            let html = '';
            checkboxes.forEach(cb => {
                let weekStart = cb.getAttribute('data-week');
                let weekDate = new Date(weekStart + 'T00:00:00');
                for (let i = 0; i < 7; i++) {
                    let dayDate = new Date(weekDate);
                    dayDate.setDate(weekDate.getDate() + i);
                    let dayName = dayNames[i];
                    let dateStr = dayDate.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' });
                    let defaultChecked = (i < 5);
                    html += `
                        <tr>
                            <td><span class="badge-week">Sem ${weekDate.toLocaleDateString('es-ES')}</span></td>
                            <td>${dayName}</td>
                            <td>${dateStr}</td>
                            <td><input type="time" class="perDayStart" value="09:00" ${!defaultChecked ? 'disabled' : ''}></td>
                            <td><input type="time" class="perDayEnd" value="17:00" ${!defaultChecked ? 'disabled' : ''}></td>
                            <td><input type="checkbox" class="day-enabled" ${defaultChecked ? 'checked' : ''}></td>
                        </tr>
                    `;
                }
            });
            perDayRows.innerHTML = html;
            perDayPanel.style.display = 'block';
            document.querySelectorAll('.day-enabled').forEach(chk => {
                chk.addEventListener('change', function() {
                    let row = this.closest('tr');
                    let startInput = row.querySelector('.perDayStart');
                    let endInput = row.querySelector('.perDayEnd');
                    if (startInput && endInput) {
                        startInput.disabled = !this.checked;
                        endInput.disabled = !this.checked;
                        if (!this.checked) {
                            startInput.value = '';
                            endInput.value = '';
                        }
                    }
                });
            });
        });

        saveBtn.addEventListener('click', function() {
            const checkboxes = document.querySelectorAll('.week-checkbox:checked');
            if (checkboxes.length === 0) {
                mostrarModal('Error', 'Selecciona al menos una semana.', 'bg-danger');
                return;
            }
            const semanas = Array.from(checkboxes).map(cb => cb.getAttribute('data-week'));
            const mismaFranja = sameFranjaCheckbox.checked;
            const request = { semanas, mismaFranja };
            if (mismaFranja) {
                const start = document.getElementById('startTime').value;
                const end = document.getElementById('endTime').value;
                if (!start || !end) {
                    mostrarModal('Error', 'Completa las horas de inicio y fin.', 'bg-danger');
                    return;
                }
                request.horaInicio = start;
                request.horaFin = end;
            } else {
                if (perDayPanel.style.display !== 'block') {
                    mostrarModal('Error', 'Primero configura los horarios por día usando el botón "Configurar por día".', 'bg-danger');
                    return;
                }
                const dias = [];
                const rows = document.querySelectorAll('#perDayRows tr');
                let allFilled = true;
                for (let row of rows) {
                    const cells = row.querySelectorAll('td');
                    if (cells.length >= 6) {
                        const enabledCheckbox = cells[5].querySelector('input[type="checkbox"]');
                        if (enabledCheckbox && enabledCheckbox.checked) {
                            const fechaTexto = cells[2].innerText;
                            const partes = fechaTexto.split('/');
                            const fechaISO = `${partes[2]}-${partes[1]}-${partes[0]}`;
                            const startInput = cells[3].querySelector('input');
                            const endInput = cells[4].querySelector('input');
                            if (startInput && endInput) {
                                if (!startInput.value || !endInput.value) {
                                    allFilled = false;
                                    startInput.style.border = !startInput.value ? '2px solid red' : '';
                                    endInput.style.border = !endInput.value ? '2px solid red' : '';
                                } else {
                                    dias.push({ fecha: fechaISO, horaInicio: startInput.value, horaFin: endInput.value });
                                }
                            }
                        }
                    }
                }
                if (!allFilled) {
                    mostrarModal('Error', 'Todos los campos de hora de los días habilitados deben estar completos.', 'bg-danger');
                    return;
                }
                request.dias = dias;
            }
            fetch('/doctor/agenda/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(request)
            })
                .then(response => {
                    if (!response.ok) {
                        return response.json().catch(() => response.text()).then(errorBody => {
                            throw new Error(errorBody.message || errorBody);
                        });
                    }
                    return response.text();
                })
                .then(message => {
                    mostrarModal('Éxito', message, 'bg-success');
                    // Recargar la página para reiniciar la vista
                    location.reload();
                })
                .catch(error => {
                    mostrarModal('Error', 'Error al guardar: ' + error.message, 'bg-danger');
                    console.error(error);
                });
        });

        function mostrarModal(titulo, mensaje, colorClase) {
            const modalHeader = document.getElementById('modalHeader');
            const modalTitle = document.getElementById('mensajeModalLabel');
            const modalBody = document.getElementById('modalBody');
            modalHeader.className = 'modal-header ' + colorClase + ' text-white';
            modalTitle.textContent = titulo;
            modalBody.textContent = mensaje;
            const modal = new bootstrap.Modal(document.getElementById('mensajeModal'));
            modal.show();
        }

        // Inicializar calendario
        generarCalendario(currentYear, currentMonth);
    </script>
</div>
